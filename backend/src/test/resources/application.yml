quarkus:
  datasource:
    db-kind: h2
    username: sa
    password: sa
    jdbc:
      url: jdbc:h2:mem:wafuriidle-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  hibernate-orm:
    schema-management:
      strategy: drop-and-create
  http:
    test-port: 0

game:
  tick:
    interval: 200ms
    publish-jitter-max: 0ms
  progression:
    player:
      kill-experience: 10
      experience-per-level: 100
      kill-gold: 25
    zone:
      kills-per-level: 10
    offline:
      notify-threshold: 5m
  gacha:
    character-pull:
      gold-cost: 250
      duplicate-essence: 15
  team:
    initial-slots: 3
    starter-choices:
      - nimbus
      - inaho
      - vyron
  combat:
    damage-interval: 1s
    respawn-delay: 1s
    revive-delay: 30s
    revive-hp-ratio: 0.5
    zone-scaling:
      hp-scaling-constant: 1.0
      reward-scaling-exponent: 0.5
      tutorial-end-level: 19
      tutorial-growth-rate: 0.005
      normal-growth-rate: 0.02
      spike-start-level: 20
      spike-growth-factor: 0.15
      spike-spacing-start: 10
      spike-spacing-max: 50
      spike-spacing-ramp: 300
    loot:
      base-item-drop-rate: 0.01
      item-level:
        stat-multiplier-per-level: 0.08
      rarity:
        common: 0.70
        rare: 0.20
        epic: 0.08
        legendary: 0.02
  content:
    refresh-interval: 1m

cluster:
  local:
    instance-id: test-instance
    internal-base-url: http://127.0.0.1:${quarkus.http.test-port}
  aws:
    metadata-base-url: http://169.254.169.254
    metadata-token-ttl-seconds: 21600
    request-timeout: 1s
  discovery:
    heartbeat-interval: 10s
    stale-after: 30s
  notify:
    request-timeout: 500ms
    max-attempts: 5
