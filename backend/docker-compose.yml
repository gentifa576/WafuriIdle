version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wafuriidle
      POSTGRES_USER: wafuri
      POSTGRES_PASSWORD: wafuri
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wafuriidle
      DB_USERNAME: wafuri
      DB_PASSWORD: wafuri
      QUARKUS_PROFILE: prod
    ports:
      - "8080:8080"

volumes:
  postgres-data:
